name: openwrt

run-name: openwrt build

on:
  # 手动触发工作流程
  workflow_dispatch:
    inputs:
      device:
        description: 'device'
        type: choice
        options:
          # 注意,这里需要和根目录下的设备目录名称一致
          - 'x86-64'
          - 'h28k'
        required: true
        default: 'x86-64'
      lan:
        description: 'Lan IP'
        type: string
        required: true
        default: '192.168.1.1'

# 定时触发工作流程
# UTC时间每天18点触发工作流程
#on:
#  schedule:
#    - cron: '0 18 * * *'

permissions:
  actions: read
  contents: read

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  SETTING_FILE: setting.sh
  TZ: Asia/Shanghai


defaults:
  run:
    shell: bash

jobs:

  build:
    name: build
    runs-on: ubuntu-24.04
    timeout-minutes: 480

    steps:

      - name: 1.view server info
        run: |
          echo "若分配的服务器性能不足，务必及时取消，重新运行！"
          echo -e "------------------------------- CPU信息 -------------------------------\n"
          echo "CPU物理数量:$(cat /proc/cpuinfo| grep "physical id"| sort| uniq| wc -l)"
          echo -e "CPU核心及版本信息: $(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
          echo -e "------------------------------- 内存信息 -------------------------------\n"
          echo "已安装内存详细信息: "
          sudo lshw -short -C memory | grep GiB
          echo -e "\n"
          echo -e "------------------------------- 磁盘信息 -------------------------------\n"
          echo -e "磁盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l) \n"
          echo "------------------------------- 磁盘详情 -------------------------------\n"
          df -Th

      - name: 2.checkout
        uses: actions/checkout@main

      - name: 3.setup python2
        uses: actions/setup-python@main
        with:
          python-version: 'pypy2.7'

      - name: 4.init environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo docker image prune --all --force
          sudo -E rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/apt/sources.list.d/* /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo -E cp -a ./ubuntu.sources /etc/apt/sources.list.d/
          sudo -E apt -qq update
          sudo -E apt -qq install git
          sudo -E systemctl daemon-reload
          sudo -E apt -qq autoremove --purge
          sudo -E apt -qq clean
          sudo -E timedatectl set-timezone "$TZ"
          sudo mkdir /workdir
          sudo chown $USER:$GROUPS /workdir
#         sudo -E apt -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool llvm lrzsz genisoimage msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev


      - name: 5.clone source code
        working-directory: /workdir
        run: |
          df -hT $PWD
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: 6.set lan ip
        if: ${{ github.event.inputs.lan }} != '192.168.1.1'
        run: |
          sed -i's/192.168.1.1/${{ github.event.inputs.lan }}/g' openwrt/package/base-files/files/bin/config_generate
          echo ${{ github.event.inputs.lan }} > lan.txt
          echo "LAN=$(cut -d '.' -f 1-3 lan.txt).1" >> "$GITHUB_ENV"
          
          echo $LAN
          sed -i '/^[[:space:]]*set network.$1.netmask=/a\                                set network.$1.dns="$LAN"' openwrt/package/base-files/files/bin/config_generate
          sed -i '/^[[:space:]]*set network.$1.netmask=/a\                                set network.$1.gateway="$LAN"' openwrt/package/base-files/files/bin/config_generate
          cat openwrt/package/base-files/files/bin/config_generate

